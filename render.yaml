services:
  - type: web
    name: resume-screening-backend
    env: docker
    rootDir: backend
    plan: free
    autoDeploy: true
    healthCheckPath: /api/dashboard/summary
    envVars:
      - key: SERVER_PORT
        value: 8080
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: SPRING_SQL_INIT_MODE
        value: always
      - key: CORS_ALLOWED_ORIGINS
        sync: false
