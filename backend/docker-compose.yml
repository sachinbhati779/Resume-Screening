services:
  mysql:
    image: mysql:8.4
    container_name: resume-screening-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: resume_screening
    ports:
      - "3306:3306"
    volumes:
      - resume-screening-data:/var/lib/mysql
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

volumes:
  resume-screening-data:
