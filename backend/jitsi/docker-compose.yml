services:
  web:
    image: jitsi/web:stable
    restart: unless-stopped
    ports:
      - "${HTTP_PORT}:80"
      - "${HTTPS_PORT}:443"
    volumes:
      - "${CONFIG}/web:/config:Z"
      - "${CONFIG}/web/letsencrypt:/etc/letsencrypt:Z"
      - "${CONFIG}/web/recordings:/usr/share/jitsi-meet/recordings:Z"
    environment:
      - "PUBLIC_URL=${PUBLIC_URL}"
      - "TZ=${TZ}"
      - "ENABLE_AUTH=${ENABLE_AUTH}"
      - "ENABLE_GUESTS=${ENABLE_GUESTS}"
      - "ENABLE_RECORDING=${ENABLE_RECORDING}"
      - "ENABLE_FILE_RECORDING_SERVICE=${ENABLE_FILE_RECORDING_SERVICE}"
    depends_on:
      - prosody
      - jicofo
      - jvb

  prosody:
    image: jitsi/prosody:stable
    restart: unless-stopped
    expose:
      - "5222"
      - "5347"
      - "5280"
    volumes:
      - "${CONFIG}/prosody/config:/config:Z"
      - "${CONFIG}/prosody/prosody-plugins-custom:/prosody-plugins-custom:Z"
    environment:
      - "TZ=${TZ}"
      - "ENABLE_AUTH=${ENABLE_AUTH}"
      - "ENABLE_GUESTS=${ENABLE_GUESTS}"
      - "PUBLIC_URL=${PUBLIC_URL}"

  jicofo:
    image: jitsi/jicofo:stable
    restart: unless-stopped
    volumes:
      - "${CONFIG}/jicofo:/config:Z"
    environment:
      - "TZ=${TZ}"
      - "ENABLE_AUTH=${ENABLE_AUTH}"
      - "ENABLE_GUESTS=${ENABLE_GUESTS}"
      - "PUBLIC_URL=${PUBLIC_URL}"
    depends_on:
      - prosody

  jvb:
    image: jitsi/jvb:stable
    restart: unless-stopped
    ports:
      - "${JVB_PORT}:10000/udp"
      - "${JVB_TCP_PORT}:4443"
    volumes:
      - "${CONFIG}/jvb:/config:Z"
    environment:
      - "TZ=${TZ}"
      - "PUBLIC_URL=${PUBLIC_URL}"
      - "JVB_ADVERTISE_IP=${JVB_ADVERTISE_IP}"
      - "JVB_PORT=10000"
      - "JVB_TCP_PORT=4443"
    depends_on:
      - prosody

  jibri:
    image: jitsi/jibri:stable
    restart: unless-stopped
    volumes:
      - "${CONFIG}/jibri:/config:Z"
      - "${CONFIG}/web/recordings:${JIBRI_RECORDING_DIR}:Z"
    environment:
      - "TZ=${TZ}"
      - "ENABLE_RECORDING=${ENABLE_RECORDING}"
      - "JIBRI_RECORDING_DIR=${JIBRI_RECORDING_DIR}"
      - "JIBRI_FINALIZE_RECORDING_SCRIPT_PATH=${JIBRI_FINALIZE_RECORDING_SCRIPT_PATH}"
    depends_on:
      - prosody
      - jicofo
      - jvb
